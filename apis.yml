aid: google-cloud-healthcare
name: Google Cloud Healthcare
description: >-
  Google Cloud Healthcare API is a fully managed, HIPAA-eligible service for ingesting, storing,
  analyzing, and integrating healthcare data in the cloud. It provides native support for FHIR R4
  (Fast Healthcare Interoperability Resources), HL7v2 clinical event messaging, and DICOM medical
  imaging standards, along with automated de-identification of protected health information (PHI).
  The API enables healthcare organizations to build interoperable data pipelines, connect clinical
  systems, and power machine learning applications on Google Cloud infrastructure.
type: Index
