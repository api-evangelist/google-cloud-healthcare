meters:
  - name: fhir_storage
    description: FHIR resource storage billed per GB-month
    unit: GB-month
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - fhir_store
  - name: fhir_read_ops
    description: Data volume processed by FHIR read operations
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - fhir_store
  - name: fhir_write_ops
    description: Data volume processed by FHIR write operations (create/update/delete)
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - fhir_store
  - name: fhir_search_ops
    description: Data volume scanned by FHIR search operations
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - fhir_store
  - name: fhir_bulk_export
    description: Data volume exported from FHIR stores to Cloud Storage or BigQuery
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
  - name: hl7v2_storage
    description: HL7v2 message storage billed per GB-month
    unit: GB-month
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - hl7v2_store
  - name: hl7v2_ingest_ops
    description: Raw byte volume of HL7v2 messages ingested
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - hl7v2_store
  - name: dicom_storage
    description: DICOM imaging file storage billed per GB-month
    unit: GB-month
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - dicom_store
  - name: dicom_ops
    description: DICOM file data volume processed by DICOMweb operations (STOW-RS/WADO-RS/QIDO-RS)
    unit: GB
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
      - dicom_store
  - name: deidentify_inspect_gu
    description: Gigabyte Units of data inspected for PHI/PII during de-identification
    unit: GU
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
  - name: deidentify_transform_gu
    description: Gigabyte Units of data transformed/redacted during de-identification
    unit: GU
    aggregation: sum
    dimensions:
      - project
      - location
      - dataset
  - name: consent_patient_monthly
    description: Active Patient consent records billed per consent per month
    unit: consent-month
    aggregation: count
    dimensions:
      - project
      - location
      - dataset
      - consent_store
  - name: consent_admin_policy_monthly
    description: Active Admin policy records billed per policy per month
    unit: policy-month
    aggregation: count
    dimensions:
      - project
      - location
      - dataset
      - consent_store
