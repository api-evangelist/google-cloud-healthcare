principles:
  - name: Visibility
    description: >-
      Enable Cloud Billing detailed export to BigQuery to gain per-project, per-dataset, and
      per-store cost attribution. Use Cloud Monitoring to track FHIR operation counts and
      data volumes. Label datasets and FHIR/HL7v2/DICOM stores by application, team, and
      environment to enable chargeback reporting in the billing export.
  - name: Allocation
    description: >-
      Organize healthcare data by creating separate datasets per business unit or application.
      Apply resource labels to datasets and stores for cost allocation. Use Cloud Billing
      budget alerts per project to track spend against healthcare data pipeline budgets.
      Separate DICOM imaging storage (typically largest cost driver) from FHIR transactional
      data in distinct projects for cleaner chargeback.
  - name: Optimization
    description: >-
      Optimize FHIR search queries with narrow date ranges and specific resource type filters
      to reduce data scanned per search. Prefer bulk import from Cloud Storage over
      per-resource FHIR create calls for initial data loads — bulk operations are more
      cost-efficient at scale. For DICOM, serve retrieved images from Cloud CDN or Cloud
      Storage signed URLs after initial retrieval rather than re-fetching from the DICOM store.
      Batch de-identification jobs during off-peak hours and monitor GU consumption to stay
      within the 1 GU/month free tier for small workloads. For Consent Management, audit
      and purge stale consent records to reduce per-active-consent monthly charges.
  - name: Accountability
    description: >-
      Set Cloud Billing budget alerts at 50%, 80%, and 100% of monthly budget per project.
      Implement Cloud Monitoring alerts on FHIR operation quotas to catch unexpected traffic
      spikes (e.g., runaway search queries). Review monthly Cloud Billing SKU-level breakdown
      to identify the top cost drivers across FHIR, HL7v2, DICOM, and de-identification.
      Track de-identification GU consumption monthly to forecast costs for compliance
      pipelines. Use Cloud Audit Logs to attribute data access and operation costs to
      specific service accounts and users.
