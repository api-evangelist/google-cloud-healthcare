description: >-
  FOCUS-aligned FinOps for Cloud Healthcare API: usage-based billing across FHIR, HL7v2, DICOM,
  and de-identification meters, plus Consent Management per-active-consent fees. Billing flows
  through Google Cloud Billing with detailed export to BigQuery for cost attribution. Major cost
  drivers are FHIR search operations (high data scan volume), DICOM egress during imaging
  retrieval, bulk export jobs, and de-identification transformation GUs. Cost optimization
  focuses on efficient FHIR search patterns, bulk import/export over per-record API calls,
  and tiered de-identification volume management.
